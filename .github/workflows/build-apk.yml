name: Build & Test APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_emulator_test:
        description: 'Run emulator test'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build APK with D8 compat
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Check DEX version
      run: |
        echo "=== DEX版本检查 ==="
        find app/build/outputs/apk -name "*.apk" | while read apk; do
          unzip -p "$apk" classes.dex | head -c 8 | xxd
          unzip -p "$apk" classes2.dex 2>/dev/null | head -c 8 | xxd || true
        done

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AIAgentApp-apk
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error

  test:
    needs: build
    if: inputs.run_emulator_test || github.event_name == 'push'
    runs-on: macos-latest
    strategy:
      matrix:
        api-level: [34]
        arch: [arm64-v8a]
        target: [google_apis]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: AIAgentApp-apk
        path: ./apk

    - name: Emulator test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ matrix.api-level }}
        target: ${{ matrix.target }}
        arch: ${{ matrix.arch }}
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
        disable-animations: true
        script: |
          echo "=== 安装APK ==="
          adb install apk/app-debug.apk
          echo ""
          echo "=== 启动APP ==="
          adb shell am start -n com.personal.aiagent/.MainActivity
          sleep 5
          echo ""
          echo "=== 检查进程 ==="
          adb shell pidof com.personal.aiagent && echo "✅ APP运行正常" || (echo "❌ APP未运行"; exit 1)
          echo ""
          adb shell screencap -p /sdcard/screen.png
          adb pull /sdcard/screen.png ./screenshot.png
          echo "✅ 测试完成"

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: emulator-results
        path: screenshot.png
        if-no-files-found: warn