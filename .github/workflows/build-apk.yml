name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Gradle wrapper if missing
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 8.5
        fi
        chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Verify APK exists
      run: |
        echo "=== APK文件列表 ==="
        find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AIAgentApp-debug
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn

    - name: Upload all APKs (fallback)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: AIAgentApp-all-build-outputs
        path: app/build/outputs/**/*.apk
        if-no-files-found: warn