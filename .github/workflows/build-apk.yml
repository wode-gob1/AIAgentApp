name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate Gradle Wrapper (needed for gradlew)
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build APK with Gradle Wrapper
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: List APK outputs
      run: |
        find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK directory"

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AIAgentApp-apk
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error